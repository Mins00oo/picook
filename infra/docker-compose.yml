services:
  postgres:
    image: postgres:15
    container_name: picook-postgres
    environment:
      POSTGRES_DB: picook_db
      POSTGRES_USER: picook_user
      POSTGRES_PASSWORD: picook_local_pw
    ports:
      - "5432:5432"
    volumes:
      - picook_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build: ../backend
    container_name: picook-backend
    env_file:
      - ../backend/secrets.env
    environment:
      # 도커 네트워크에서만 다른 값 (secrets.env의 localhost를 override)
      DB_HOST: postgres
      FILE_UPLOAD_DIR: /data/picook/uploads
    ports:
      - "8080:8080"
    volumes:
      - picook_uploads:/data/picook/uploads
      - picook_logs:/var/log/picook
    depends_on:
      - postgres
    restart: unless-stopped

  # Lighthouse 로그 수집 에이전트
  vector:
    image: timberio/vector:0.38.0-alpine
    container_name: picook-vector
    command: ["-c", "/etc/vector/vector.yaml"]
    restart: unless-stopped
    volumes:
      - ./vector/vector.yaml:/etc/vector/vector.yaml:ro
      - picook_logs:/var/log/picook:ro
      - vector_data:/var/lib/vector
    environment:
      - ENV=prod
    depends_on:
      - backend

volumes:
  picook_pgdata:
  picook_uploads:
  picook_logs:
  vector_data:
