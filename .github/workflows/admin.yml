name: Admin CI

on:
  push:
    branches: [main]
    paths: ['admin/**', 'shared/**']
  pull_request:
    branches: [main]
    paths: ['admin/**', 'shared/**']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/package-lock.json

      - name: Install dependencies
        working-directory: admin
        run: npm ci

      - name: TypeScript check
        working-directory: admin
        run: npx tsc --noEmit

      - name: Build
        working-directory: admin
        run: npm run build
