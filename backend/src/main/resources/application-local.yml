spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/picook_db
    username: picook_user
    password: picook_local_pw
    driver-class-name: org.postgresql.Driver

  jpa:
    properties:
      hibernate:
        show_sql: true
        
server:
  port: 8080
  
openai:
  api-key: ${OPENAI_API_KEY:your-api-key-here}

# JWT
jwt:
  secret: ${JWT_SECRET:change-me-in-production-minimum-256-bit-secret-key-here}
  access-expiration: 3600000      # 1h
  refresh-expiration: 2592000000  # 30d

aws:
  s3:
    bucket: picook-bucket-dev
    region: ap-northeast-2
    access-key: local-access-key
    secret-key: local-secret-key

logging:
  level:
    com.picook: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
