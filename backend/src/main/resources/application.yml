spring:
  application:
    name: picook-backend
  profiles:
    active: local
    
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB


# File Upload
file:
  upload-dir: ${FILE_UPLOAD_DIR:/data/picook/uploads}

# OpenAI
openai:
  api-key: ${OPENAI_API_KEY}
  whisper-model: whisper-1
  chat-model: gpt-5.4-mini
  ai-model-version: ${AI_MODEL_VERSION:gpt-5.4-mini-2025}

# Shorts
shorts:
  ytdlp-path: ${YTDLP_PATH:yt-dlp}
  ffmpeg-path: ${FFMPEG_PATH:ffmpeg}
  temp-dir: ${SHORTS_TEMP_DIR:/tmp/picook-shorts}

# Apple Sign-In
apple:
  bundle-id: ${APPLE_BUNDLE_ID:com.picook.app}

# Actuator / Prometheus (Lighthouse 모니터링)
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    db:
      enabled: true
    diskspace:
      enabled: true
  metrics:
    tags:
      application: picook-backend

# Lighthouse 모니터링 IP 화이트리스트
monitoring:
  allowed-ips:
    - ${LIGHTHOUSE_IP:127.0.0.1}
