spring:
  application:
    name: picook-backend

  config:
    import: optional:file:secrets.env[.properties]

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        show_sql: ${HIBERNATE_SHOW_SQL}
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: 8080

# JWT
jwt:
  secret: ${JWT_SECRET}
  access-expiration: 3600000      # 1h
  refresh-expiration: 2592000000  # 30d

# File Upload
file:
  upload-dir: ${FILE_UPLOAD_DIR}

# Apple Sign-In
apple:
  bundle-id: ${APPLE_BUNDLE_ID}

# Actuator / Prometheus (Lighthouse 모니터링)
management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    db:
      enabled: true
    diskspace:
      enabled: true
  metrics:
    tags:
      application: picook-backend

# Lighthouse 모니터링 IP 화이트리스트
monitoring:
  allowed-ips: ${MONITORING_ALLOWED_IPS}

# Security
security:
  trusted-proxies: ${TRUSTED_PROXIES}
