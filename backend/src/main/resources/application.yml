spring:
  application:
    name: picook-backend
  profiles:
    active: local
    
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB


# AWS S3
aws:
  s3:
    bucket: ${S3_BUCKET}
    region: ${S3_REGION}
    access-key: ${S3_ACCESS_KEY}
    secret-key: ${S3_SECRET_KEY}

# OpenAI
openai:
  api-key: ${OPENAI_API_KEY}
  whisper-model: whisper-1
  chat-model: gpt-4o
  ai-model-version: ${AI_MODEL_VERSION:gpt-4o-2025}

# Shorts
shorts:
  ytdlp-path: ${YTDLP_PATH:yt-dlp}
  ffmpeg-path: ${FFMPEG_PATH:ffmpeg}
  temp-dir: ${SHORTS_TEMP_DIR:/tmp/picook-shorts}

# Apple Sign-In
apple:
  bundle-id: ${APPLE_BUNDLE_ID:com.picook.app}

logging:
  level:
    com.picook: DEBUG
    org.hibernate.SQL: DEBUG
