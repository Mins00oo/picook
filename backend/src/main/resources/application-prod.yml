spring:
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://localhost:5432/picook_db
    username: picook_user
    password: picook_local_pw
    driver-class-name: org.postgresql.Driver

  jpa:
    properties:
      hibernate:
        show_sql: true

server:
  port: 8080

# JWT
jwt:
  secret: ${JWT_SECRET:}
  access-expiration: 3600000      # 1h
  refresh-expiration: 2592000000  # 30d

file:
  upload-dir: D:/work/project/workspace/Prj/picook/shared/uploads
